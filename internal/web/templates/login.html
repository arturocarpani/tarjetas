<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseOwl</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/style.css">
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
                else if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <style>
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .login-card {
            width: 100%; max-width: 360px; background: var(--card-bg, #11243f);
            border: 1px solid var(--border-color, #1d3a5f); border-radius: 16px; padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,.25);
        }
        .login-card h1 { text-align: center; margin: 0 0 .25rem; font-size: 1.4rem; }
        .login-card p.sub { text-align: center; margin: 0 0 1.5rem; opacity: .7; font-size: .9rem; }
        .login-card label { display: block; font-size: .85rem; margin: .75rem 0 .25rem; opacity: .85; }
        .login-card input {
            width: 100%; box-sizing: border-box; padding: .6rem .75rem; border-radius: 8px;
            border: 1px solid var(--border-color, #1d3a5f); background: var(--input-bg, #0b1b30);
            color: inherit; font-size: 1rem;
        }
        .login-card button {
            width: 100%; margin-top: 1.25rem; padding: .7rem; border: none; border-radius: 8px;
            background: var(--accent, #2dd4bf); color: #04201c; font-weight: 600; font-size: 1rem; cursor: pointer;
        }
        .login-card button:disabled { opacity: .6; cursor: not-allowed; }
        .login-msg { margin-top: 1rem; text-align: center; font-size: .9rem; min-height: 1.2em; }
        .login-msg.error { color: #f87171; }
        .login-logo { display: block; margin: 0 auto 1rem; width: 64px; height: 64px; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <img src="/pwa/icon-192.png" alt="ExpenseOwl" class="login-logo">
            <h1 id="title">Iniciar sesión</h1>
            <p class="sub" id="subtitle">Ingresá a tu cuenta</p>
            <form id="login-form" autocomplete="on">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" autocomplete="username" required minlength="3">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required minlength="8">
                <button type="submit" id="submit-btn">Entrar</button>
            </form>
            <div class="login-msg" id="msg"></div>
        </div>
    </div>
    <script>
        let needsSetup = false;
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('msg');
        const pwd = document.getElementById('password');

        async function init() {
            // already logged in? go home.
            try {
                const me = await fetch('/auth/me');
                if (me.ok) { window.location.href = '/'; return; }
            } catch (e) {}
            try {
                const s = await fetch('/auth/status').then(r => r.json());
                needsSetup = !!s.needsSetup;
            } catch (e) {}
            if (needsSetup) {
                title.textContent = 'Crear administrador';
                subtitle.textContent = 'Primera vez: creá la cuenta de administrador';
                btn.textContent = 'Crear cuenta';
                pwd.setAttribute('autocomplete', 'new-password');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = '';
            msg.className = 'login-msg';
            btn.disabled = true;
            const body = JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: pwd.value,
            });
            const url = needsSetup ? '/auth/setup' : '/auth/login';
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
                if (res.ok) { window.location.href = '/'; return; }
                const data = await res.json().catch(() => ({}));
                msg.textContent = data.error || 'Error';
                msg.className = 'login-msg error';
            } catch (err) {
                msg.textContent = 'Error de red';
                msg.className = 'login-msg error';
            } finally {
                btn.disabled = false;
            }
        });

        init();
    </script>
</body>
</html>
