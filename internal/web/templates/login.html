<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/fa.min.css">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/pwa/icon-192.png">
    <link rel="stylesheet" href="/style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <title>Tarjetas · Iniciar sesión</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-bar">
                <span class="brand brand-login">Tarjetas</span>
            </div>
        </header>

        <div class="form-container" style="max-width: 400px; margin: 2rem auto;">
            <h2 align="center" style="margin-top: 0;">Iniciar sesión</h2>
            <form id="loginForm" class="expense-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="nav-button">Entrar</button>
            </form>
            <div id="loginMessage" class="form-message"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('loginMessage');
            messageDiv.textContent = '';
            messageDiv.className = 'form-message';
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const error = await response.json();
                    messageDiv.textContent = error.error || 'No se pudo iniciar sesión';
                    messageDiv.className = 'form-message error';
                }
            } catch (err) {
                messageDiv.textContent = 'Error de red. Intentá de nuevo.';
                messageDiv.className = 'form-message error';
            }
        });
    </script>
</body>
</html>
